# =============================================================================
# OpenAI 兼容推理服务 — 运行时配置（分层级 YAML）
# =============================================================================
# 加载方式：src/serve/runtime/runtime_yaml.py 在进程启动最早阶段读取本文件，
#           将下列字段映射为同名「大写环境变量」写入 os.environ。
# 生效方式：大多数字段修改后需重启容器或 uvicorn 进程；仅改文件默认不会热更新。
#          例外：SYSTEM_PROMPT_FILE 指向的提示词文本可通过
#          POST /admin/prompt/reload（或 /health 页面按钮）热重载。
# 路径说明：容器内默认 /workspace/config/runtime.yaml（由 compose 的
#           RUNTIME_CONFIG_FILE 与卷 ./config:/workspace/config 提供）。
# 优先级：  本文件中出现的键会覆盖进程内已有环境变量（YAML 为业务调参主来源）。
# =============================================================================
#
# 字段 -> 环境变量 对照（实现见 runtime_yaml.py 的 _mapping_pairs）
#   serve.model_id                    -> MODEL_ID
#   serve.port                        -> PORT
#   serve.prefer_cuda                 -> PREFER_CUDA
#   prompt.system_prompt_file         -> SYSTEM_PROMPT_FILE
#   logging.enable_debug              -> ENABLE_DEBUG_LOG
#   weights.llm.quant_mode            -> WEIGHT_QUANT_MODE_LLM
#   weights.vision.quant_mode         -> WEIGHT_QUANT_MODE_VISION
#   weights.llm.bnb_4bit.quant_type   -> LLM_BNB_4BIT_QUANT_TYPE
#   weights.llm.bnb_4bit.double_quant -> LLM_BNB_4BIT_DOUBLE_QUANT
#   weights.llm.bnb_4bit.compute_fp16 -> LLM_BNB_4BIT_COMPUTE_FP16
#   weights.vision.bnb_4bit.quant_type   -> VISION_BNB_4BIT_QUANT_TYPE
#   weights.vision.bnb_4bit.double_quant -> VISION_BNB_4BIT_DOUBLE_QUANT
#   weights.vision.bnb_4bit.compute_fp16 -> VISION_BNB_4BIT_COMPUTE_FP16
#   weights.cuda.force_reclaim_between_towers -> FORCE_RECLAIM_BETWEEN_TOWERS
#   weights.bnb_modules_to_not_convert -> BNB_MODULES_TO_NOT_CONVERT（逗号分隔，可选）
#   inference.use_cache               -> INFERENCE_USE_CACHE
#   inference.disconnect_cancel_grace_sec -> DISCONNECT_CANCEL_GRACE_SEC
#   vision.dynamic_image_size         -> DYNAMIC_IMAGE_SIZE
#   vision.strict_input_size          -> STRICT_VISION_INPUT_SIZE
#   vision.input_size                 -> VISION_INPUT_SIZE
#   limits.max_images_per_request     -> MAX_IMAGES_PER_REQUEST
#   limits.max_new_tokens             -> MAX_NEW_TOKENS
#   limits.image_max_bytes            -> IMAGE_MAX_BYTES
#
# =============================================================================

# -----------------------------------------------------------------------------
# serve — HTTP 服务与设备选择（映射 MODEL_ID / PORT / PREFER_CUDA）
# -----------------------------------------------------------------------------
serve:
  # model_id -> MODEL_ID：OpenAI 兼容接口对外返回、以及请求体里 model 字段可匹配的模型标识。
  model_id: unipercept

  # port -> PORT：容器内 HTTP 监听端口；须与 docker-compose 里 ports 的「容器侧」端口一致。
  port: 8000

  # prefer_cuda -> PREFER_CUDA：是否在可用时优先使用 CUDA；false 时尝试 CPU（速度/显存需自行评估）。
  prefer_cuda: true

# -----------------------------------------------------------------------------
# prompt — 系统提示词（映射 SYSTEM_PROMPT_FILE）
# -----------------------------------------------------------------------------
prompt:
  # system_prompt_file -> SYSTEM_PROMPT_FILE：系统提示词文件在容器内的绝对路径。
  #                       与内联环境变量 SYSTEM_PROMPT 二选一；通常用文件便于维护。
  #                       默认建议使用严格 JSON 版本提示词。
  system_prompt_file: /workspace/config/system_prompt_json.txt

# -----------------------------------------------------------------------------
# logging — 服务调试日志（映射 ENABLE_DEBUG_LOG）
# -----------------------------------------------------------------------------
logging:
  # enable_debug -> ENABLE_DEBUG_LOG：
  #   true  — 输出中文 DEBUG 日志（模型加载、接口请求、模型运行链路）；
  #   false — 仅保留现有 INFO/WARNING/ERROR 日志。
  enable_debug: true

# -----------------------------------------------------------------------------
# weights — 权重量化（仅分塔配置）
# -----------------------------------------------------------------------------
weights:
  # load_order -> WEIGHT_TOWER_LOAD_ORDER：双塔加载顺序控制（影响双次加载时的峰值显存与最终 reserved 形态）。
  #   auto         — 默认：按量化档位自动决定 — 先加载更「省显存」的一塔（4bit → 8bit → 未量化）；
  #                  两塔档位相同时先 vision 再 llm（与旧版同档行为一致）。
  #   llm_first    — 强制先加载语言塔，再加载视觉塔；
  #   vision_first — 强制先加载视觉塔，再加载语言塔。
  # 未设置时等价于 auto。
  # load_order: llm_first
  # load_order: vision_first
  load_order: auto
  # llm.quant_mode -> WEIGHT_QUANT_MODE_LLM
  # vision.quant_mode -> WEIGHT_QUANT_MODE_VISION
  # 量化开关（两塔分别配置，互不影响）。
  #
  # quant_mode 可选值：
  # - none / off：
  #   不做 bitsandbytes 量化（全精度/半精度由模型与运行时决定），质量最好但显存占用最高。
  # - 8bit / 8-bit：
  #   使用 bitsandbytes 的 8-bit 加载（常见为 LLM.int8 类路径）；显存显著下降，速度通常接近原生，
  #   但不同算子/硬件上可能略有质量或速度差异。
  # - 4bit / 4-bit：
  #   使用 bitsandbytes 的 4-bit 量化加载；显存进一步下降，但更依赖 GPU/算子支持，
  #   且需要额外用 bnb_4bit.* 指定 4-bit 细节参数（见下）。
  #
  # 注意：
  # - 量化主要影响「权重加载与推理显存/速度」，并不会改变接口协议；修改后需重启服务生效。
  # - 4bit/8bit 依赖 bitsandbytes 与对应 CUDA 环境；在不支持的环境下可能会回退或直接报错（以日志为准）。
  llm:
    # 语言塔量化模式。
    quant_mode: 4bit # 8bit
    # bnb_4bit：仅当 quant_mode=4bit 时使用（bitsandbytes 4-bit 加载参数）。
    bnb_4bit:
      # quant_type：4-bit 量化格式。
      # - nf4：NormalFloat4，实践中更常用、在同等显存下通常比 fp4 更稳。
      # - fp4：Float4，部分场景可能更快/更兼容但精度波动更大。
      quant_type: nf4
      # double_quant：是否启用「二次量化」（把量化常数再压缩），进一步省显存，通常对质量影响较小。
      double_quant: true
      # compute_fp16：4-bit 权重量化后，矩阵乘等计算使用 FP16（true）还是更高精度（如 BF16/FP32，取决于实现）。
      # 一般情况下：true 更省显存/更快；若遇到数值不稳定或不支持，可尝试关闭并结合硬件能力调整。
      compute_fp16: true
  vision:
    quant_mode: 8bit # 8bit
    # bnb_4bit：仅当 quant_mode=4bit 时使用（与 llm.bnb_4bit 含义一致，但可独立设置）。
    bnb_4bit:
      quant_type: nf4
      double_quant: true
      compute_fp16: true

  # cuda：与「权重加载」相关的 CUDA 行为（不影响量化数值本身）。
  cuda:
    # force_reclaim_between_towers -> FORCE_RECLAIM_BETWEEN_TOWERS：
    #   双塔分两次加载时，在第一塔完成后、第二塔开始前强制执行一次 CUDA reclaim（empty_cache 等），
    #   用于压低峰值/碎片导致的 reserved；关闭时仍遵循 INFERENCE_RECLAIM_BETWEEN_STAGES 的轻量 reclaim。
    #   仅由本项（或同名环境变量）控制，与 logging.enable_debug / ENABLE_DEBUG_LOG 无关。
    force_reclaim_between_towers: true

  # bnb_modules_to_not_convert -> BNB_MODULES_TO_NOT_CONVERT
  # 逗号分隔的额外跳过前缀；会分别合并到 llm/vision 加载阶段的默认跳过集合。
  # bnb_modules_to_not_convert: "vision_model.some_block,language_model.model.layers.0"

  # 说明：即使 llm/vision 量化模式相同，服务也会按两塔独立读取各自 bnb_4bit 参数。

# -----------------------------------------------------------------------------
# inference — 生成行为（映射 INFERENCE_USE_CACHE）
# -----------------------------------------------------------------------------
inference:
  # use_cache -> INFERENCE_USE_CACHE：生成阶段是否使用 KV cache。
  #   true  — 默认更快；
  #   false — 可降低显存占用，生成变慢。
  use_cache: true
  # disconnect_cancel_grace_sec -> DISCONNECT_CANCEL_GRACE_SEC：
  #   当客户端断开连接后，服务端等待多少秒再触发“协作式停止推理”。
  #   建议 1~5 秒：过小可能误杀短暂网络抖动，过大则浪费 GPU 计算。
  disconnect_cancel_grace_sec: 3

# -----------------------------------------------------------------------------
# vision — 图像预处理与尺寸校验（映射 DYNAMIC_IMAGE_SIZE / STRICT_VISION_INPUT_SIZE / VISION_INPUT_SIZE）
# -----------------------------------------------------------------------------
vision:
  # dynamic_image_size -> DYNAMIC_IMAGE_SIZE：是否按动态策略处理视觉输入尺寸，并与 <IMG_CONTEXT> token 数量联动
  #                      （便于使用低于模型 config 的边长）。
  dynamic_image_size: true

  # strict_input_size -> STRICT_VISION_INPUT_SIZE：当 vision.input_size 与模型 config 不一致时，
  #   true  — 直接报错；
  #   false — 仅打日志告警（常与 dynamic_image_size 同开）。
  strict_input_size: false

  # input_size -> VISION_INPUT_SIZE：图像预处理短边/方形边长（像素）；用于控制显存与速度。
  input_size: 448 # 224

# -----------------------------------------------------------------------------
# limits — 请求与资源上限（映射 MAX_IMAGES_PER_REQUEST / MAX_NEW_TOKENS / IMAGE_MAX_BYTES）
# -----------------------------------------------------------------------------
limits:
  # max_images_per_request -> MAX_IMAGES_PER_REQUEST：单次请求允许附带的最大图片张数。
  max_images_per_request: 1

  # max_new_tokens -> MAX_NEW_TOKENS：单次生成允许的新增 token 上限；越大越占显存与时间。
  max_new_tokens: 2048

  # image_max_bytes -> IMAGE_MAX_BYTES：单张图片解码/校验允许的最大字节数（防超大 base64 或 URL 拉取）。
  #                  52428800 = 50 MiB；可按部署调大/调小。
  image_max_bytes: 52428800
