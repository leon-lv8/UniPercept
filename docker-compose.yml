# GPU 需要：宿主机 NVIDIA 驱动可用（nvidia-smi）+ nvidia-container-toolkit，且已生成 CDI 规范供 Docker 发现。
# 若报错 "failed to discover GPU vendor from CDI: no known GPU vendor found"（Docker 29+ 常见）：
#   在宿主机执行（Ubuntu/Debian，需 sudo）：bash scripts/setup_host_env.sh
#   （Docker 与镜像加速、可选 .run 驱动、有 GPU 时 CDI、hf 模型下载均在同脚本中按步骤执行）
#   手工等价步骤：sudo mkdir -p /etc/cdi && sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
#   然后：sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker
#   验证：docker run --rm --gpus all nvidia/cuda:12.0.0-base-ubuntu22.04 nvidia-smi
# 无 GPU 时可取消注释 unipercept-cpu，并不要加 --profile gpu。
#
# 仅下载 HF 权重（镜像基础：python:3.12-slim-bookworm + 官方 hf CLI；需 token 时传入 HF_TOKEN，勿提交到 Git）：
#   export HF_TOKEN=hf_xxx   # 或写入已加入 .gitignore 的 .env
#   docker compose build hf-download
#   docker compose --profile download run --rm hf-download
# 模型写入 ./ckpt/unipercept，与 unipercept-gpu 挂载路径一致。

services:
  hf-download:
    profiles: ["download"]
    build:
      context: .
      dockerfile: docker/hf-download/Dockerfile
    image: unipercept-hf-download:latest
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODEL_ID: ${HF_MODEL_ID:-Thunderbolt215215/UniPercept}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
    volumes:
      - ./ckpt/unipercept:/out

  # unipercept-cpu:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #     args:
  #       INSTALL_FLASH_ATTN: "false"
  #   image: unipercept-openai:latest
  #   container_name: unipercept-openai-cpu
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     MODEL_PATH: /models/unipercept
  #     MODEL_ID: unipercept-vl
  #     PORT: "8000"
  #     PREFER_CUDA: "false"
  #   volumes:
  #     - ./ckpt/unipercept:/models/unipercept:ro
  #     - ./examples:/workspace/examples:ro

  unipercept-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        INSTALL_FLASH_ATTN: "false"
        INSTALL_GIT: "${INSTALL_GIT:-false}"
        INSTALL_BITSANDBYTES: "${INSTALL_BITSANDBYTES:-true}"
    image: unipercept-openai:latest
    container_name: unipercept-openai-gpu
    ports:
      - "18000:8000"
    environment:
      # OpenAI 兼容接口对外返回/匹配的模型标识（客户端 model 字段常与此一致）
      MODEL_ID: unipercept
      # 容器内 HTTP 服务监听端口（与上方 ports 的容器侧端口一致）
      PORT: "8000"
      # 有 GPU 时是否优先走 CUDA；false 则尝试 CPU（显存与速度需自行评估）
      PREFER_CUDA: "true"
      # 系统提示词文件路径（容器内）；与 SYSTEM_PROMPT 环境变量二选一，通常用文件便于维护
      # SYSTEM_PROMPT_FILE: /workspace/config/system_prompt.txt
      SYSTEM_PROMPT_FILE: /workspace/config/system_prompt_json.txt
      # JSON 系统提示场景：true=IAA/IQA/ISTA 由服务端先算分并写入用户侧消息再 chat，助手回复不再在 JSON 前重复三行分数；false=保留「三行分数 + 正文」旧版排版
      JSON_SCORE_IN_USER_PROMPT: "true"
      # bitsandbytes：8bit 权重加载（与 4bit 勿同时开启，否则启动报错）
      LOAD_IN_8BIT: "false"
      # bitsandbytes：4bit 权重加载（省显存；常配合较低 VISION_INPUT_SIZE、MAX_NEW_TOKENS，质量建议抽测）
      LOAD_IN_4BIT: "true"
      # 4bit 量化类型（BitsAndBytesConfig），常用 nf4
      BNB_4BIT_QUANT_TYPE: "nf4"
      # 4bit 是否启用嵌套双量化（进一步省显存，略增开销）
      BNB_4BIT_DOUBLE_QUANT: "true"
      # 4bit 反量化/矩阵乘是否在 fp16 上计算（true=fp16，false 时为 bf16）
      BNB_4BIT_COMPUTE_FP16: "true"
      # 生成阶段是否使用 KV cache：1/true=启用（默认，更快）；0/false=关闭可降显存、生成变慢
      INFERENCE_USE_CACHE: "1"
      # 是否按动态策略处理视觉输入尺寸，并与 <IMG_CONTEXT> token 数量联动（便于低于 config 的边长）
      DYNAMIC_IMAGE_SIZE: "true"
      # VISION_INPUT_SIZE 与模型 config 不一致时：true=直接报错；false=仅告警（常与动态视觉尺寸同用）
      STRICT_VISION_INPUT_SIZE: "false"
      # 图像预处理短边/方形边长（像素）；用于控显存与速度
      VISION_INPUT_SIZE: "224"
      # 单次请求允许附带的最大图片张数
      MAX_IMAGES_PER_REQUEST: "1"
      # 单次生成允许的新增 token 上限（越大越耗显存与时间）
      MAX_NEW_TOKENS: "1024"
      # 单张图片解码/校验允许的最大字节数（防超大 base64 或上传）
      IMAGE_MAX_BYTES: 52428800  # 50MB
      # NVIDIA 容器插件：对容器暴露哪些 GPU（all 表示全部可见）
      NVIDIA_VISIBLE_DEVICES: all
      # 容器内可用的 NVIDIA 驱动能力集（compute=CUDA，utility=nvidia-smi 等）
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./ckpt/unipercept:/models/unipercept:ro
      - ./config:/workspace/config:ro
    gpus: all
